<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline 1900–2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="timeline-container">
    <div id="timeline-track">
      <div id="year-segments"></div>
      <div id="year-markers"></div>
      <div id="month-markers"></div>
      <div id="events-container"></div>
    </div>
  </div>

  <div id="hud">
    <span class="hud-label">Zoom:</span><span id="hud-zoom-value"></span>
    <span class="hud-sep">·</span>
    <span class="hud-label">Center:</span><span id="hud-date-value"></span>
    <span class="hud-sep">·</span>
    <span id="hud-visible-value"></span>
    <span class="hud-sep">·</span>
    <span class="hud-label">Show:</span>
    <label class="hud-imp"><input type="checkbox" class="imp-cb" value="1" checked><span data-imp="1">1</span></label>
    <label class="hud-imp"><input type="checkbox" class="imp-cb" value="2" checked><span data-imp="2">2</span></label>
    <label class="hud-imp"><input type="checkbox" class="imp-cb" value="3" checked><span data-imp="3">3</span></label>
    <label class="hud-imp"><input type="checkbox" class="imp-cb" value="4" checked><span data-imp="4">4</span></label>
    <label class="hud-imp"><input type="checkbox" class="imp-cb" value="5" checked><span data-imp="5">5</span></label>
  </div>

  <div id="loading">Loading timeline data...</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
