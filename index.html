<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline 1940-2020</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="timeline-container">
    <div id="timeline-track">
      <div id="timeline-line"></div>
      <div id="year-markers"></div>
      <div id="events-left" class="events-column"></div>
      <div id="events-right" class="events-column"></div>
    </div>
  </div>

  <div id="hud">
    <div id="hud-zoom">Zoom: <span id="hud-zoom-value"></span></div>
    <div id="hud-date">Viewing: <span id="hud-date-value"></span></div>
    <div id="hud-visible">Events: <span id="hud-visible-value"></span></div>
  </div>

  <div id="loading">Loading timeline data...</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
